# =============================================================================
# Security & dependency audits (standalone — not grouped with legacy mobile builds)
# =============================================================================
name: Reusable security audits

on:
  workflow_call:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Secret scan & dependency audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Gitleaks (secret scan, working tree)
        run: |
          set -euo pipefail
          VERSION=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz
          chmod +x gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --no-git --verbose --exit-code 1 --redact

      - name: Verify Supabase RLS baseline SQL (docs)
        run: node scripts/verify-rls-baseline.mjs

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (npm ci, all workspaces)
        run: npm ci

      # Production/installable deps only: devDependency chains (e.g. legacy Capacitor asset tooling) may
      # still report highs under a full-tree audit; --omit=dev matches shipped/runtime risk for npm gate.
      - name: Vulnerability scan — npm audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      # OSV-Scanner (https://github.com/google/osv-scanner) — OSV.dev DB; complements npm audit and pip-audit
      - name: Vulnerability scan — OSV-Scanner (OSV.dev)
        run: |
          set -euo pipefail
          VERSION=2.3.5
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner scan -L package-lock.json
          ./osv-scanner scan -L requirements.txt

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Vulnerability scan — pip-audit (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt --desc on --ignore-vuln CVE-2026-4539
